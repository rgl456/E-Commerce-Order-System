input {
  # Services send JSON logs to this TCP port
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse the timestamp from the log event
  date {
    match => ["timestamp", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
    target => "@timestamp"
  }

  # Extract trace/span IDs to top-level fields for easy filtering
  # This is what connects a Kibana log to a Zipkin trace
  if [traceId] {
    mutate {
      add_field => {
        "trace_id" => "%{traceId}"
        "span_id"  => "%{spanId}"
      }
    }
  }

  # Tag slow requests for easy filtering
  if [duration_ms] and [duration_ms] > 1000 {
    mutate { add_tag => ["slow_request"] }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # One index per service per day — keeps indices manageable
    index => "microservices-%{[service_name]}-%{+YYYY.MM.dd}"
  }

  # Also print to stdout for debugging
  stdout { codec => rubydebug }
}