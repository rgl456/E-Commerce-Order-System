spring:
  application:
    name: order-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}:${random.value}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/microservices-realm

resilience4j:
  circuitbreaker:
    instances:
      inventory-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - feign.RetryableException
          - java.net.ConnectException
        ignore-exceptions:
          - com.ragul.OrderService.exception.ResourceNotFoundException
          - com.ragul.OrderService.exception.BusinessException

      product-service:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        record-exceptions:
          - java.util.concurrent.TimeoutException
          - java.net.ConnectException
        ignore-exceptions:
          - com.ragul.OrderService.exception.ResourceNotFoundException

  retry:
    instances:
      inventory-service:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        enable-exponential-backoff: true
        retry-exceptions:
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException
          - feign.RetryableException
        ignore-exceptions:
          - com.ragul.OrderService.exception.ResourceNotFoundException
          - com.ragul.OrderService.exception.BusinessException

      product-service:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.util.concurrent.TimeoutException

  timelimiter:
    instances:
      inventory-service:
        timeout-duration: 3s
        cancel-running-future: true

      product-service:
        timeout-duration: 2s
        cancel-running-future: true


  bulkhead:
    instances:
      inventory-service:
        max-concurrent-calls: 10
        max-wait-duration: 0ms

      product-service:
        max-concurrent-calls: 15
        max-wait-duration: 0ms

  ratelimiter:
    instances:
      order-creation:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0ms

management:
  endpoints:
    web:
      exposure:
        # expose prometheus endpoint so Prometheus can scrape metrics
        include: health, info, metrics, prometheus, circuitbreakers
  metrics:
    # Tag every metric with the service name
    # In Grafana: filter by service="order-service"
    tags:
      application: ${spring.application.name}
    distribution:
      # Track latency percentiles for HTTP requests
      percentiles-histogram:
        http:
          server:
            requests: true
      # Pre-compute p50, p95, p99 percentiles
      percentiles:
        http:
          server:
            requests: 0.5, 0.95, 0.99

  tracing:
    # Sampling rate: 1.0 = trace every request
    # In production use 0.1 (10%) or lower to reduce overhead
    # For development, 1.0 is fine
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Logging — include trace/span IDs in every log line
logging:
  pattern:
    # %X{traceId} and %X{spanId} are automatically populated by Micrometer Tracing
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
  level:
    com.example: DEBUG
    io.micrometer: INFO